<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Login</title>
      <link rel="stylesheet" href="login.css">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
      <div class="container">
            <div class="left">
                  <div class="title">Edusync</div>
                  <img src="../Pictures/Schedule-bro 1.svg" height="400px" width="400px">
            </div>
            <div class="right">
                  <div class="title">Login</div>
                  <div class="subtitle">Enter credentials to login</div>
                  <div class="field">
                        <div class="Email">
                              <div class="title"></div>
                              <div class="input"></div>
                        </div>
                        <div class="password">
                              <div class="title"></div>
                              <div class="input"></div>
                        </div>
                        <div class="tools">
                              <div class="remember_me"></div>
                              <div class="forget_password"></div>
                        </div>
                        <div class="login_btn">

                        </div>
                        <div class="or">
                              <div class="line_1"></div>
                              <div class="or_text"></div>
                              <div class="line_1"></div> 
                        </div>
                        <div class="login_icons">
                              <div class="google"></div>
                              <div class="meta"></div>
                              <div class="apple"></div>
                        </div>
                        <div class="no_account">
                              <div class="text"></div>
                              <div class="register_text"></div>
                        </div>
                  </div>
            </div>
      </div>

</body>
</html>
