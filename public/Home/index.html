<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>EduSync</title>
      <link rel="stylesheet" href="main.css">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
      <div class="menu">
            <div class="top">
                  <div class="title">EduSync</div>
                  <div class="buttons">
                        <div class="menu_buttons" id="Home">
                              <img src="../Pictures/home.svg">
                              <div class="text">Home</div>
                        </div>
                        <div class="menu_buttons" id="Planner">
                              <img src="../Pictures/calendar.svg">
                              <div class="text">Planner</div>
                        </div>
                  </div>
            </div>
            <div class="bottom">
                  <div class="user">
                        <img src="../Pictures/icon-256x256.png" id="profile_picture">
                        <div class="text">
                              <div class="name">[Name]</div>
                              <div class="email">[Email]</div>
                        </div>
                  </div>
                  <div class="buttons">
                        <div class="button" id="Settigns">
                              <img src="../Pictures/settings.svg">
                              Settigns
                        </div>
                        <div class="button" id="Logout">
                              <img src="../Pictures/log-out.svg">
                              Logout
                        </div>
                  </div>
            </div>
      </div>
      <div class="container">
            
      </div>
      <script src="../Home/JS/main.js"></script>
</body>
</html>
